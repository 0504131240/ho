<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ניהול אתר בניה</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #e67e22;
      --primary-dark: #ca6f1e;
      --secondary: #2c3e50;
      --bg: #f5f6fa;
      --card: #ffffff;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --border: #e0e0e0;
      --success: #27ae60;
      --danger: #e74c3c;
      --shadow: 0 2px 12px rgba(0,0,0,0.10);
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    header {
      background: linear-gradient(135deg, var(--secondary) 0%, #1a252f 100%);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 64px;
    }
    .header-logo { font-size: 28px; }
    .header-title { font-size: 20px; font-weight: 700; }
    .header-subtitle { font-size: 12px; color: #bdc3c7; margin-top: 1px; }

    nav {
      background: var(--secondary);
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      gap: 4px;
    }
    .tab-btn {
      background: none;
      border: none;
      color: #bdc3c7;
      padding: 14px 22px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: inherit;
    }
    .tab-btn:hover { color: #fff; }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .section { display: none; }
    .section.active { display: block; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .section-title { font-size: 22px; font-weight: 700; color: var(--secondary); }
    .section-title span { font-size: 24px; margin-left: 8px; }

    .card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 24px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.18s;
      font-family: inherit;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #ecf0f1; color: var(--secondary); }
    .btn-secondary:hover { background: #dfe6e9; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }

    /* ===== CALENDAR ===== */
    .calendar-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .calendar-nav { display: flex; align-items: center; gap: 12px; }
    .cal-nav-btn {
      background: none;
      border: 2px solid var(--border);
      border-radius: 8px;
      width: 34px; height: 34px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      color: var(--secondary);
      flex-shrink: 0;
    }
    .cal-nav-btn:hover { border-color: var(--primary); color: var(--primary); }
    .cal-month-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--secondary);
      text-align: center;
      flex: 1;
    }
    .cal-swipe-wrapper { overflow: hidden; touch-action: pan-y; }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      width: 100%;
    }
    .cal-day-header {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-light);
      padding: 5px 0;
    }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 8px;
      border: 2px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: #f8f9fa;
      min-width: 0;
    }
    .cal-day:hover { border-color: var(--primary); background: #fff8f0; }
    .cal-day.empty { background: transparent; cursor: default; pointer-events: none; }
    .cal-day.today { border-color: var(--primary); background: #fff3e0; }
    .cal-day.has-data { background: #e8f5e9; border-color: var(--success); }
    .cal-day.has-data:hover { background: #c8e6c9; }
    .cal-day.future { opacity: 0.38; cursor: not-allowed; pointer-events: none; }
    .cal-day-num { font-size: clamp(11px, 2.5vw, 15px); font-weight: 600; color: var(--text); line-height: 1; }
    .cal-day-workers { font-size: clamp(9px, 1.8vw, 11px); color: var(--success); font-weight: 700; margin-top: 2px; }

    .monthly-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 18px;
    }
    .stat-box {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 14px 8px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .stat-num { font-size: 24px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 11px; color: var(--text-light); margin-top: 3px; font-weight: 600; }

    /* ===== FORMS ===== */
    .collapsible-form { display: none; }
    .collapsible-form.open { display: block; }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s;
      font-family: inherit;
      direction: rtl;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-textarea { min-height: 100px; resize: vertical; }

    /* ===== PHOTO ZONE ===== */
    .photo-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 28px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
    }
    .photo-zone:hover, .photo-zone.drag-over { border-color: var(--primary); background: #fff8f0; }
    .photo-zone-icon { font-size: 32px; margin-bottom: 8px; }
    .photo-zone-text { font-size: 13px; color: var(--text-light); }
    .photo-zone input[type=file] { display: none; }

    .photo-previews { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .photo-preview-item {
      position: relative;
      width: 90px; height: 90px;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid var(--border);
    }
    .photo-preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .remove-photo {
      position: absolute;
      top: 3px; left: 3px;
      background: rgba(231,76,60,0.9);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 20px; height: 20px;
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }

    /* ===== UPDATE CARDS ===== */
    .updates-list { display: flex; flex-direction: column; gap: 20px; }
    .update-card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .update-card-header {
      background: linear-gradient(135deg, #f8f9fa 0%, #ecf0f1 100%);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .update-card-date { font-size: 13px; color: var(--text-light); font-weight: 600; }
    .update-card-title { font-size: 16px; font-weight: 700; color: var(--secondary); }
    .update-card-body { padding: 16px 20px; }
    .update-card-desc { font-size: 14px; line-height: 1.6; color: var(--text); margin-bottom: 12px; }
    .update-card-photos { display: flex; flex-wrap: wrap; gap: 8px; }
    .update-photo {
      width: 110px; height: 110px;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid var(--border);
      transition: transform 0.15s;
    }
    .update-photo:hover { transform: scale(1.04); border-color: var(--primary); }

    /* ===== PLANS ===== */
    .plans-upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
      margin-bottom: 24px;
    }
    .plans-upload-zone:hover, .plans-upload-zone.drag-over { border-color: var(--primary); background: #fff8f0; }
    .plans-upload-icon { font-size: 48px; margin-bottom: 12px; }
    .plans-upload-text { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .plans-upload-sub { font-size: 13px; color: var(--text-light); }
    .plans-upload-zone input[type=file] { display: none; }

    .plans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    .plan-item {
      background: var(--card);
      border-radius: 10px;
      border: 2px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
      transition: all 0.15s;
    }
    .plan-item:hover { border-color: var(--primary); box-shadow: var(--shadow); }
    .plan-icon { font-size: 40px; }
    .plan-name { font-size: 13px; font-weight: 600; color: var(--text); word-break: break-word; line-height: 1.4; }
    .plan-meta { font-size: 11px; color: var(--text-light); }
    .plan-actions { display: flex; gap: 6px; }
    .plan-thumb {
      width: 100%;
      height: 110px;
      object-fit: contain;
      border-radius: 6px;
      background: #f5f6fa;
      border: 1px solid var(--border);
      cursor: pointer;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.52);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.22);
      width: 100%;
      max-width: 500px;
      max-height: 92vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--secondary); }
    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-light);
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
    }
    .modal-close:hover { background: #f0f0f0; }
    .modal-body { padding: 22px 24px; }
    .modal-footer {
      padding: 14px 24px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* Worker total display */
    .worker-total-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: #fff8f0;
      border: 2px solid var(--primary);
      border-radius: 12px;
      margin-top: 6px;
    }
    .worker-total-num {
      font-size: 48px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }
    .worker-total-sub {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
      font-weight: 600;
    }

    /* Worker type rows */
    .worker-type-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .worker-type-label { font-size: 14px; font-weight: 600; flex: 1; color: var(--text); }

    /* Num pick button */
    .num-pick-btn {
      min-width: 52px;
      height: 38px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: #f8f9fa;
      font-size: 18px;
      font-weight: 800;
      color: var(--text-light);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .num-pick-btn:hover { border-color: var(--primary); }
    .num-pick-btn.has-value { color: var(--primary); border-color: var(--primary); background: #fff3e0; }
    .num-pick-btn.active { border-color: var(--primary); background: #fff3e0; box-shadow: 0 0 0 3px rgba(230,126,34,0.18); }

    /* ===== INLINE PICKER ===== */
    .inline-picker-wrap {
      position: relative;
      height: 108px;
      border-radius: 8px;
      border: 2px solid var(--primary);
      background: #fff8f0;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .inline-picker-scroll {
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .inline-picker-scroll::-webkit-scrollbar { display: none; }
    .inline-picker-pad { height: 36px; flex-shrink: 0; }
    .inline-picker-item {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      color: var(--text-light);
      scroll-snap-align: center;
    }
    .inline-picker-highlight {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: 0; right: 0;
      height: 36px;
      border-top: 2px solid var(--primary);
      border-bottom: 2px solid var(--primary);
      background: rgba(230,126,34,0.08);
      pointer-events: none;
      z-index: 1;
    }
    .inline-picker-fade-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 36px;
      background: linear-gradient(to bottom, #fff8f0 30%, transparent);
      pointer-events: none;
      z-index: 2;
    }
    .inline-picker-fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 36px;
      background: linear-gradient(to top, #fff8f0 30%, transparent);
      pointer-events: none;
      z-index: 2;
    }

    /* Edit types helpers */
    .wt-order-btns { display: flex; flex-direction: column; gap: 2px; }
    .wt-order-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 24px; height: 20px;
      cursor: pointer;
      font-size: 9px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-light);
      padding: 0;
      line-height: 1;
      transition: all 0.12s;
    }
    .wt-order-btn:hover:not([disabled]) { border-color: var(--primary); color: var(--primary); }
    .wt-order-btn[disabled] { opacity: 0.25; cursor: default; }
    .wt-delete-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 28px; height: 28px;
      cursor: pointer;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-light);
      transition: all 0.12s;
      flex-shrink: 0;
    }
    .wt-delete-btn:hover { border-color: var(--danger); color: var(--danger); }
    .add-type-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      align-items: center;
    }
    .add-type-row .form-input { flex: 1; padding: 8px 12px; font-size: 13px; }
    .modal-divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
    .lightbox-close {
      position: absolute;
      top: 20px; left: 20px;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      width: 46px; height: 46px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.25); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: var(--secondary);
      color: #fff;
      padding: 13px 26px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 3000;
      transition: transform 0.3s;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .empty-icon { font-size: 54px; margin-bottom: 14px; }
    .empty-text { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .empty-sub { font-size: 13px; }

    .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-bar .form-input { flex: 1; min-width: 180px; }

    @media (max-width: 640px) {
      main { padding: 10px; }
      .header-inner { padding: 0 12px; }
      .nav-inner { padding: 0 4px; }
      .tab-btn { padding: 12px 8px; font-size: 12px; }
      .plans-grid { grid-template-columns: repeat(2, 1fr); }
      .modal { max-width: 100%; }
      .card { padding: 14px; }
      .calendar-grid { gap: 4px; }
    }
    @media (max-width: 380px) {
      .card { padding: 10px; }
      .calendar-grid { gap: 3px; }
      .cal-day-header { font-size: 10px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-logo">🏗️</div>
    <div>
      <div class="header-title">ניהול אתר בניה</div>
      <div class="header-subtitle">מערכת ניהול שוטפת</div>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <button class="tab-btn active" onclick="showTab('journal')">📅 יומן פועלים</button>
    <button class="tab-btn" onclick="showTab('progress')">📊 התקדמות</button>
    <button class="tab-btn" onclick="showTab('plans')">📐 תוכניות</button>
  </div>
</nav>

<main>

  <div id="section-journal" class="section active">
    <div class="section-header">
      <div class="section-title"><span>📅</span> יומן פועלים</div>
      <button class="btn btn-primary" onclick="openDayModal(todayStr())">✏️ עדכן היום</button>
    </div>
    <div class="card">
      <div class="calendar-controls">
        <div class="calendar-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">›</button>
          <div class="cal-month-label" id="cal-month-label"></div>
          <button class="cal-nav-btn" onclick="changeMonth(1)">‹</button>
        </div>
      </div>
      <div class="cal-swipe-wrapper" id="cal-swipe-wrapper">
        <div class="calendar-grid" id="calendar-grid"></div>
      </div>
      <div class="monthly-stats" id="monthly-stats"></div>
    </div>
    <div id="journal-recent"></div>
  </div>

  <div id="section-progress" class="section">
    <div class="section-header">
      <div class="section-title"><span>📊</span> עדכוני התקדמות</div>
      <button class="btn btn-primary" onclick="toggleUpdateForm()" id="add-update-btn">➕ הוסף עדכון</button>
    </div>
    <div class="card collapsible-form" id="update-form">
      <h3 style="margin-bottom:18px;font-size:16px;color:var(--secondary)">✏️ עדכון חדש</h3>
      <div class="form-group">
        <label class="form-label">תאריך</label>
        <input type="date" class="form-input" id="upd-date">
      </div>
      <div class="form-group">
        <label class="form-label">כותרת</label>
        <input type="text" class="form-input" id="upd-title" placeholder="מה בוצע היום?">
      </div>
      <div class="form-group">
        <label class="form-label">תיאור</label>
        <textarea class="form-textarea" id="upd-desc" placeholder="פרט את ההתקדמות..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">תמונות</label>
        <div class="photo-zone" onclick="document.getElementById('upd-photos-input').click()" id="upd-photo-zone">
          <div class="photo-zone-icon">📷</div>

      <div id="edit-types-list"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script>
let currentDate = new Date();
let activeDayStr = null;
let pendingUpdatePhotos = [];
let pickerActiveType = null;
let pickerCloseHandler = null;

const ITEM_H = 36;

const DEFAULT_WORKER_TYPES = ['תפסנים','בנאים','טייחים','עובד כללי','רצפים','פועלי גמר'];

const DB = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)) || {}; } catch { return {}; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  getArr: k => { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } },
  setArr: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
};

// ===== WORKER TYPES =====
function getWorkerTypes() {
  const stored = DB.getArr('workerTypes');
  return stored.length ? stored : [...DEFAULT_WORKER_TYPES];
}

function getCurrentTypeValues() {
  const values = {};
  document.querySelectorAll('#worker-types-list .num-pick-btn').forEach(btn => {
    values[btn.dataset.type] = parseInt(btn.dataset.value) || 0;
  });
  return values;
}

function renderWorkerTypesList(savedValues) {
  const types = getWorkerTypes();
  document.getElementById('worker-types-list').innerHTML = types.map((t, i) => {
    const val = (savedValues && savedValues[t]) || 0;
    return '<div class="worker-type-row">' +
      '<span class="worker-type-label">👷 ' + t + '</span>' +
      '<button class="num-pick-btn' + (val > 0 ? ' has-value' : '') + '" data-type="' + t + '" data-value="' + val + '" onclick="openNumPicker(' + i + ')">' + val + '</button>' +
      '</div>';
  }).join('');
}

function updateTotalFromTypes() {
  let total = 0;
  document.querySelectorAll('#worker-types-list .num-pick-btn').forEach(btn => {
    total += parseInt(btn.dataset.value) || 0;
  });
  document.getElementById('worker-count-display').textContent = total;
}

// ===== INLINE NUM PICKER =====
function openNumPicker(typeIdx) {
  closeNumPicker();

  const types = getWorkerTypes();
  pickerActiveType = types[typeIdx];
  const btn = document.querySelector('#worker-types-list .num-pick-btn[data-type="' + pickerActiveType + '"]');
  if (!btn) return;
  const currentVal = parseInt(btn.dataset.value) || 0;

  btn.classList.add('active');

  let html = '<div class="inline-picker-fade-top"></div>' +
             '<div class="inline-picker-highlight"></div>' +
             '<div class="inline-picker-fade-bottom"></div>' +
             '<div class="inline-picker-scroll" id="inline-picker-scroll">' +
             '<div class="inline-picker-pad"></div>';
  for (let i = 0; i <= 99; i++) {
    html += '<div class="inline-picker-item">' + i + '</div>';
  }
  html += '<div class="inline-picker-pad"></div></div>';

  const pickerEl = document.createElement('div');
  pickerEl.id = 'inline-picker';
  pickerEl.className = 'inline-picker-wrap';
  pickerEl.innerHTML = html;

  const row = btn.closest('.worker-type-row');
  row.after(pickerEl);

  const scrollEl = document.getElementById('inline-picker-scroll');
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      scrollEl.scrollTop = currentVal * ITEM_H;
    });
  });

  scrollEl.addEventListener('scroll', function() {
    const val = Math.max(0, Math.min(99, Math.round(this.scrollTop / ITEM_H)));
    btn.dataset.value = val;
    btn.textContent = val;
    btn.classList.toggle('has-value', val > 0);
    updateTotalFromTypes();
  }, { passive: true });

  setTimeout(function() {
    pickerCloseHandler = function(e) {
      const picker = document.getElementById('inline-picker');
      if (picker && !picker.contains(e.target) && e.target !== btn) {
        closeNumPicker();
      }
    };
    document.addEventListener('click', pickerCloseHandler, true);
  }, 0);
}

function closeNumPicker() {
  const el = document.getElementById('inline-picker');
  if (el) el.remove();
  if (pickerCloseHandler) {
    document.removeEventListener('click', pickerCloseHandler, true);
    pickerCloseHandler = null;
  }
  if (pickerActiveType) {
    const btn = document.querySelector('#worker-types-list .num-pick-btn[data-type="' + pickerActiveType + '"]');
    if (btn) btn.classList.remove('active');
  }
  pickerActiveType = null;
}

// ===== EDIT TYPES MODAL =====
function openEditTypesModal() {
  closeNumPicker();
  renderEditTypesList();
  document.getElementById('edit-new-type').value = '';
  document.getElementById('edit-types-overlay').classList.add('open');
}

function closeEditTypesModal(e, force) {
  if (!force && e && e.target !== document.getElementById('edit-types-overlay')) return;
  document.getElementById('edit-types-overlay').classList.remove('open');
  const currentVals = getCurrentTypeValues();
  renderWorkerTypesList(currentVals);
  updateTotalFromTypes();
}

function renderEditTypesList() {
  const types = getWorkerTypes();
  document.getElementById('edit-types-list').innerHTML = types.map((t, i) => `
    <div class="worker-type-row">
      <div class="wt-order-btns">
        <button class="wt-order-btn" onclick="editMoveType(${i},-1)" ${i === 0 ? 'disabled' : ''}>▲</button>
        <button class="wt-order-btn" onclick="editMoveType(${i},1)" ${i === types.length - 1 ? 'disabled' : ''}>▼</button>
      </div>
      <span class="worker-type-label">👷 ${t}</span>
      <button class="wt-delete-btn" onclick="editDeleteType(${i})">✕</button>
    </div>
  `).join('');
}

function editAddType() {
  const input = document.getElementById('edit-new-type');
  const name = input.value.trim();
  if (!name) return;
  const types = getWorkerTypes();
  if (types.includes(name)) { showToast('סוג זה כבר קיים', 'error'); return; }
  types.push(name);
  DB.setArr('workerTypes', types);
  input.value = '';
  renderEditTypesList();
}

function editDeleteType(idx) {
  const types = getWorkerTypes();
  types.splice(idx, 1);
  DB.setArr('workerTypes', types);
  renderEditTypesList();
}

function editMoveType(idx, dir) {
  const types = getWorkerTypes();
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= types.length) return;
  [types[idx], types[newIdx]] = [types[newIdx], types[idx]];
  DB.setArr('workerTypes', types);
  renderEditTypesList();
}

// ===== TABS =====
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  const idx = { journal: 0, progress: 1, plans: 2 }[name];
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if (name === 'journal') renderCalendar();
  if (name === 'progress') renderUpdates();
  if (name === 'plans') renderPlans();
}

// ===== DATE HELPERS =====
function todayStr() { return fmtDate(new Date()); }
function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function hebrewDate(ds) {
  const [y,m,d] = ds.split('-');
  const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return `${parseInt(d)} ב${months[parseInt(m)-1]} ${y}`;
}
function hebrewMonth(y, m) {
  const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return `${months[m]} ${y}`;
}

// ===== SWIPE =====
function setupCalendarSwipe() {
  const wrapper = document.getElementById('cal-swipe-wrapper');
  let startX = 0, startY = 0, dragging = false;
  wrapper.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX; startY = e.touches[0].clientY; dragging = true;
  }, { passive: true });
  wrapper.addEventListener('touchend', e => {
    if (!dragging) return;
    dragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
    changeMonth(dx < 0 ? 1 : -1);
  }, { passive: true });
}

// ===== CALENDAR =====
function changeMonth(dir) {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + dir, 1);
  renderCalendar(dir > 0 ? 'next' : 'prev');
}

function animateCalendar(dir) {
  const grid = document.getElementById('calendar-grid');
  const fromX = dir === 'next' ? '40px' : '-40px';
  grid.style.transition = 'none';
  grid.style.transform = `translateX(${fromX})`;
  grid.style.opacity = '0';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      grid.style.transition = 'transform 0.28s ease, opacity 0.28s ease';
      grid.style.transform = 'translateX(0)';
      grid.style.opacity = '1';
    });
  });
}

function renderCalendar(animDir) {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const today = todayStr();
  const journal = DB.get('journal');

  document.getElementById('cal-month-label').textContent = hebrewMonth(year, month);

  const grid = document.getElementById('calendar-grid');
  const days = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
  grid.innerHTML = days.map(d => `<div class="cal-day-header">${d}</div>`).join('');

  const firstDay = new Date(year, month, 1).getDay();
  const total = new Date(year, month+1, 0).getDate();

  for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="cal-day empty"></div>`;

  for (let day = 1; day <= total; day++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const e = journal[ds];
    const isToday = ds === today;
    const isFuture = ds > today;
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (e && e.total > 0) cls += ' has-data';
    if (isFuture) cls += ' future';
    grid.innerHTML += `<div class="${cls}" onclick="openDayModal('${ds}')" title="${hebrewDate(ds)}">
      <div class="cal-day-num">${day}</div>
      ${e && e.total > 0 ? `<div class="cal-day-workers">${e.total}פ'</div>` : ''}
    </div>`;
  }

  let totalDays = 0, totalWorkers = 0, maxDay = 0;
  Object.entries(journal).forEach(([ds, e]) => {
    const [y, m] = ds.split('-');
    if (parseInt(y) === year && parseInt(m)-1 === month && e.total > 0) {
      totalDays++;
      totalWorkers += e.total;
      if (e.total > maxDay) maxDay = e.total;
    }
  });
  document.getElementById('monthly-stats').innerHTML = `
    <div class="stat-box"><div class="stat-num">${totalDays}</div><div class="stat-label">ימי עבודה</div></div>
    <div class="stat-box"><div class="stat-num">${totalWorkers}</div><div class="stat-label">סה"כ נוכחות</div></div>
    <div class="stat-box"><div class="stat-num">${maxDay}</div><div class="stat-label">שיא יומי</div></div>`;

  if (animDir) animateCalendar(animDir);
  renderJournalRecent();
}

function renderJournalRecent() {
  const journal = DB.get('journal');
  const entries = Object.entries(journal)
    .filter(([,e]) => e.total > 0)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .slice(0, 5);
  const el = document.getElementById('journal-recent');
  if (!entries.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="card">
    <div style="font-size:15px;font-weight:700;color:var(--secondary);margin-bottom:14px">📋 רשומות אחרונות</div>
    ${entries.map(([ds, e]) => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openDayModal('${ds}')">
        <div>
          <div style="font-weight:600;font-size:14px">${hebrewDate(ds)}</div>
          ${e.notes ? `<div style="font-size:12px;color:var(--text-light);margin-top:2px">${e.notes.slice(0,65)}${e.notes.length>65?'...':''}</div>` : ''}
        </div>
        <div style="text-align:center;min-width:52px">
          <div style="font-size:24px;font-weight:800;color:var(--primary)">${e.total}</div>
          <div style="font-size:11px;color:var(--text-light)">פועלים</div>
        </div>
      </div>`).join('')}
  </div>`;
}

// ===== DAY MODAL =====
function openDayModal(ds) {
  activeDayStr = ds;
  document.getElementById('day-modal-title').textContent = '📅 ' + hebrewDate(ds);
  const e = DB.get('journal')[ds] || { total: 0, types: {}, notes: '' };
  document.getElementById('day-notes').value = e.notes || '';
  renderWorkerTypesList(e.types || {});
  updateTotalFromTypes();
  const del = document.getElementById('day-delete-btn');
  del.style.display = (DB.get('journal')[ds] && DB.get('journal')[ds].total > 0) ? 'inline-flex' : 'none';
  document.getElementById('day-modal-overlay').classList.add('open');
}

function closeDayModal(e, force) {
  if (!force && e && e.target !== document.getElementById('day-modal-overlay')) return;
  closeNumPicker();
  document.getElementById('day-modal-overlay').classList.remove('open');
  activeDayStr = null;
}

function saveDayEntry() {
  if (!activeDayStr) return;
  closeNumPicker();
  const total = parseInt(document.getElementById('worker-count-display').textContent) || 0;
  const types = getCurrentTypeValues();
  const notes = document.getElementById('day-notes').value.trim();
  const journal = DB.get('journal');
  journal[activeDayStr] = { total, types, notes, updatedAt: Date.now() };
  DB.set('journal', journal);
  closeDayModal(null, true);
  renderCalendar();
  showToast('✅ היומן עודכן!', 'success');
}

function deleteDay() {
  if (!activeDayStr) return;
  const journal = DB.get('journal');
  delete journal[activeDayStr];
  DB.set('journal', journal);
  closeDayModal(null, true);
  renderCalendar();
  showToast('🗑️ נמחק');
}

// ===== PROGRESS UPDATES =====
function toggleUpdateForm(forceClose) {
  const form = document.getElementById('update-form');
  const btn = document.getElementById('add-update-btn');
  if (forceClose || form.classList.contains('open')) {
    form.classList.remove('open');
    btn.innerHTML = '➕ הוסף עדכון';
    resetUpdateForm();
  } else {
    form.classList.add('open');
    btn.innerHTML = '✕ סגור';
    document.getElementById('upd-date').value = todayStr();
  }
}

function resetUpdateForm() {
  ['upd-date','upd-title','upd-desc'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('upd-photo-previews').innerHTML = '';
  pendingUpdatePhotos = [];
}

function handleUpdatePhotos(input) {
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      pendingUpdatePhotos.push({ name: file.name, data: e.target.result });
      renderUpdatePhotoPreviews();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderUpdatePhotoPreviews() {
  document.getElementById('upd-photo-previews').innerHTML = pendingUpdatePhotos.map((p, i) =>
    `<div class="photo-preview-item">
      <img src="${p.data}" alt="${p.name}">
      <button class="remove-photo" onclick="removePendingPhoto(${i})">✕</button>
    </div>`
  ).join('');
}

function removePendingPhoto(idx) {
  pendingUpdatePhotos.splice(idx, 1);
  renderUpdatePhotoPreviews();
}

function saveUpdate() {
  const date = document.getElementById('upd-date').value;
  const title = document.getElementById('upd-title').value.trim();
  const desc = document.getElementById('upd-desc').value.trim();
  if (!date || !title) { showToast('נא למלא תאריך וכותרת', 'error'); return; }
  const updates = DB.getArr('updates');
  updates.unshift({ id: Date.now(), date, title, desc, photos: [...pendingUpdatePhotos], createdAt: Date.now() });
  DB.setArr('updates', updates);
  toggleUpdateForm(true);
  renderUpdates();
  showToast('✅ עדכון נשמר!', 'success');
}

function renderUpdates() {
  const updates = DB.getArr('updates');
  const q = (document.getElementById('prog-search')?.value || '').toLowerCase();
  const filtered = updates.filter(u =>
    !q || u.title.toLowerCase().includes(q) || (u.desc||'').toLowerCase().includes(q)
  );
  const el = document.getElementById('updates-list');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📊</div>
      <div class="empty-text">אין עדכונים עדיין</div>
      <div class="empty-sub">לחץ על "הוסף עדכון" כדי להתחיל</div>
    </div>`;
    return;
  }
  el.innerHTML = filtered.map(u => `
    <div class="update-card">
      <div class="update-card-header">
        <div>
          <div class="update-card-title">${u.title}</div>
          <div class="update-card-date">📅 ${hebrewDate(u.date)}</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteUpdate(${u.id})">🗑️</button>
      </div>
      <div class="update-card-body">
        ${u.desc ? `<div class="update-card-desc">${u.desc.replace(/\n/g,'<br>')}</div>` : ''}
        ${u.photos?.length ? `<div class="update-card-photos">${u.photos.map(p =>
          `<img class="update-photo" src="${p.data}" alt="${p.name}" onclick="openLightbox('${p.data}')">`
        ).join('')}</div>` : ''}
      </div>
    </div>`).join('');
}

function deleteUpdate(id) {
  DB.setArr('updates', DB.getArr('updates').filter(u => u.id !== id));
  renderUpdates();
  showToast('🗑️ נמחק');
}

// ===== PLANS =====
function handlePlansUpload(input) {
  const files = Array.from(input.files);
  const plans = DB.getArr('plans');
  Promise.all(files.map(file => new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const ext = file.name.split('.').pop().toLowerCase();
      const type = ['jpg','jpeg','png','gif','webp','svg'].includes(ext) ? 'image'
                 : ext === 'pdf' ? 'pdf' : 'other';
      plans.unshift({ id: Date.now() + Math.random(), name: file.name, size: file.size, type, ext, data: e.target.result, uploadedAt: Date.now() });
      resolve();
    };
    reader.readAsDataURL(file);
  }))).then(() => {
    DB.setArr('plans', plans);
    renderPlans();
    showToast(`✅ ${files.length} קבצים הועלו!`, 'success');
  });
  input.value = '';
}

function renderPlans() {
  const plans = DB.getArr('plans');
  const q = (document.getElementById('plans-search')?.value || '').toLowerCase();
  const ft = document.getElementById('plans-filter')?.value || '';
  const filtered = plans.filter(p =>
    (!q || p.name.toLowerCase().includes(q)) && (!ft || p.type === ft)
  );
  const el = document.getElementById('plans-grid');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📐</div>
      <div class="empty-text">אין תוכניות עדיין</div>
      <div class="empty-sub">גרור קבצים או לחץ להעלאה</div>
    </div>`;
    return;
  }
  const fmtSize = b => b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(1) + ' KB' : (b/1048576).toFixed(1) + ' MB';
  const fmtTime = ts => new Date(ts).toLocaleDateString('he-IL');
  const fileIcon = p => p.type === 'image' ? '🖼️' : p.ext === 'pdf' ? '📄' : ['dwg','dxf'].includes(p.ext) ? '📐' : '📁';
  el.innerHTML = `<div class="plans-grid">${filtered.map(p => `
    <div class="plan-item">
      ${p.type === 'image'
        ? `<img class="plan-thumb" src="${p.data}" onclick="openLightbox('${p.data}')">`
        : `<div class="plan-icon">${fileIcon(p)}</div>`}
      <div class="plan-name">${p.name}</div>
      <div class="plan-meta">${fmtSize(p.size)} · ${fmtTime(p.uploadedAt)}</div>
      <div class="plan-actions">
        <button class="btn btn-secondary btn-sm" onclick="downloadPlan(${p.id})">⬇️</button>
        <button class="btn btn-danger btn-sm" onclick="deletePlan(${p.id})">🗑️</button>
      </div>
    </div>`).join('')}</div>`;
}

function downloadPlan(id) {
  const plan = DB.getArr('plans').find(p => p.id === id);
  if (!plan) return;
  const a = document.createElement('a');
  a.href = plan.data; a.download = plan.name; a.click();
}

function deletePlan(id) {
  DB.setArr('plans', DB.getArr('plans').filter(p => p.id !== id));
  renderPlans();
  showToast('🗑️ נמחק');
}

// ===== DRAG & DROP =====
function setupDrop(zoneId, handler) {
  const zone = document.getElementById(zoneId);
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) handler({ files: e.dataTransfer.files, value: '' });
  });
}

// ===== LIGHTBOX =====
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ===== TOAST =====
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  renderCalendar();
  setupCalendarSwipe();
  setupDrop('upd-photo-zone', handleUpdatePhotos);
  setupDrop('plans-drop-zone', handlePlansUpload);
  document.getElementById('upd-date').max = todayStr();
  document.getElementById('edit-new-type').addEventListener('keydown', e => {
    if (e.key === 'Enter') editAddType();
  });
});
</script>
